<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTEC Immobilier — Espace pro (CRM)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal-dark:#2E6357; --teal:#3D8074; --teal-light:#5FA08F;
  --bleu:#1A2738; --bleu-2:#243A54;
  --gris-fonce:#4A5A5E; --gris-clair:#C9D0D3; --gris-bg:#F4F6F7;
  --noir:#2A3338; --blanc:#fff;
  --ombre:0 2px 14px rgba(42,51,56,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:var(--noir);background:var(--gris-bg);line-height:1.5}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---------- Connexion ---------- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--bleu),var(--bleu-2));padding:20px}
.login-card{background:#fff;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.35);padding:38px 34px;width:100%;max-width:400px}
.login-card .logo{text-align:center;margin-bottom:8px}
.login-card .logo b{color:var(--teal)}
.login-card h1{font-size:1.3rem;text-align:center;margin-bottom:4px;color:var(--bleu)}
.login-card p.sub{text-align:center;color:var(--gris-fonce);font-size:.9rem;margin-bottom:24px}
.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fld label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--gris-fonce)}
.fld input{padding:12px 13px;border:1.5px solid var(--gris-clair);border-radius:10px;font:inherit}
.fld input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(61,128,116,.18)}
.btn{display:inline-block;background:var(--teal);color:#fff;padding:12px 22px;border-radius:10px;font-weight:600;border:none;transition:.15s;text-align:center}
.btn:hover{background:var(--teal-dark)}
.btn-block{width:100%}
.btn-sm{padding:8px 14px;font-size:.86rem;border-radius:8px}
.btn-ghost{background:#fff;color:var(--teal);border:1.5px solid var(--teal)}
.btn-ghost:hover{background:var(--teal);color:#fff}
.btn-danger{background:#fff;color:#b3261e;border:1.5px solid #e7b3ae}
.btn-danger:hover{background:#b3261e;color:#fff;border-color:#b3261e}
.msg{font-size:.86rem;margin-top:12px;text-align:center;min-height:18px}
.msg.err{color:#b3261e}.msg.ok{color:var(--teal-dark)}

/* ---------- App ---------- */
#app{display:flex;flex-direction:column;min-height:100vh}
/* Bandeau de menu horizontal pleine largeur (bleu, onglet actif en vert) */
.topnav{background:var(--bleu);color:#c5cfdb;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:0 22px;position:sticky;top:0;z-index:40;box-shadow:0 2px 10px rgba(42,51,56,.18)}
.topnav .brand{font-weight:800;font-size:1.05rem;color:#fff;white-space:nowrap;padding-right:14px}
.topnav .brand b{color:var(--teal-light)}
.topnav nav{display:flex;flex-wrap:wrap;flex:1}
.topnav nav a{display:flex;align-items:center;gap:8px;height:62px;padding:0 19px;font-weight:500;color:#c5cfdb;
  border-bottom:3px solid transparent;transition:.15s}
.topnav nav a:hover{background:rgba(255,255,255,.08);color:#fff}
.topnav nav a.on{background:var(--teal);color:#fff}
.topnav .who{display:flex;align-items:center;gap:10px;font-size:.82rem;white-space:nowrap}
.topnav .who .mail{color:#fff;font-weight:600}
.topnav .who .btn{padding:8px 14px;font-size:.8rem}
.topnav .who .btn-ghost{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.45)}
.topnav .who .btn-ghost:hover{background:rgba(255,255,255,.24);color:#fff;border-color:#fff}
.main{flex:1;min-width:0;width:100%}
.topbar{background:#fff;border-bottom:1px solid var(--gris-clair);padding:0 30px;height:60px;
  display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:1.2rem;color:var(--bleu)}
.content{padding:26px 30px}

/* cartes stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:#fff;border:1px solid var(--gris-clair);border-radius:14px;padding:18px 20px}
.stat .n{font-size:2rem;font-weight:800;color:var(--teal-dark);line-height:1}
.stat .l{color:var(--gris-fonce);font-size:.86rem;margin-top:6px}

/* tableaux */
.panel{background:#fff;border:1px solid var(--gris-clair);border-radius:14px;overflow:hidden}
.panel-h{padding:16px 20px;border-bottom:1px solid var(--gris-clair);display:flex;align-items:center;justify-content:space-between}
.panel-h h3{font-size:1.05rem;color:var(--bleu)}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th,td{text-align:left;padding:12px 20px;border-bottom:1px solid var(--gris-bg)}
th{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--gris-fonce);background:var(--gris-bg)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafcfc}
td.num{font-variant-numeric:tabular-nums;letter-spacing:.3px;white-space:nowrap}
.tag{display:inline-block;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--gris-bg);color:var(--gris-fonce);border:1px solid rgba(42,51,56,.14)}
.tag.green{background:rgba(61,128,116,.14);color:var(--teal-dark)}
.tag.blue{background:rgba(26,39,56,.1);color:var(--bleu)}
/* Cadre coloré autour du nom dans le fichier clients (écriture noire conservée) */
.cli-nom{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:20px;border:1px solid transparent;font-weight:700}
.cli-nom.soc{background:rgba(61,128,116,.16);border-color:rgba(61,128,116,.5);color:#2E6357}
.cli-nom.part{background:rgba(30,80,140,.14);border-color:rgba(30,80,140,.5);color:#1e508c}
.empty{padding:40px;text-align:center;color:var(--gris-fonce)}
.loading{padding:40px;text-align:center;color:var(--gris-fonce)}

/* modale matching */
.modal-bg{position:fixed;inset:0;background:rgba(26,39,56,.55);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 20px;z-index:100;overflow:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:760px;box-shadow:0 30px 70px rgba(0,0,0,.4)}
.modal-h{padding:20px 24px;border-bottom:1px solid var(--gris-clair);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{color:var(--bleu)}
.modal-b{padding:8px 24px 24px}
.x{background:none;border:none;font-size:1.5rem;color:var(--gris-fonce);line-height:1}
.match{border:1px solid var(--gris-clair);border-radius:12px;padding:14px 16px;margin-top:14px;display:flex;gap:16px;align-items:center}
.score{flex-shrink:0;width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1.2rem;color:#fff;background:var(--teal)}
.score.mid{background:#c79a2e}.score.low{background:var(--gris-fonce)}
.match .info{flex:1;min-width:0}
.match .info b{color:var(--bleu)}
.ecarts{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

/* formulaires */
.modal-f{padding:4px 24px;max-height:64vh;overflow:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--gris-clair);display:flex;justify-content:space-between;align-items:center;gap:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--gris-fonce)}
.f input,.f select,.f textarea{padding:10px 11px;border:1.5px solid var(--gris-clair);border-radius:9px;font:inherit;width:100%;background:#fff;color:var(--noir)}
.f textarea{resize:vertical;min-height:70px}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(61,128,116,.16)}
.f.check{flex-direction:row;align-items:center;gap:8px}
.f.check input{width:auto}
.f.check label{text-transform:none;font-size:.9rem;font-weight:500;color:var(--noir)}
.form-sep{grid-column:1/-1;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-dark);margin-top:6px;border-top:1px solid var(--gris-clair);padding-top:14px}
.loc-row{display:flex;gap:8px;margin-bottom:8px}
.loc-row input{flex:1;padding:10px 11px;border:1.5px solid var(--gris-clair);border-radius:9px;font:inherit}
.lien{background:none;border:none;color:var(--teal-dark);font-weight:600;font-size:.85rem;padding:4px 0;cursor:pointer}
.form-msg{font-size:.86rem}.form-msg.err{color:#b3261e}
/* autocomplétion ville */
.ac-list{position:absolute;z-index:30;background:#fff;border:1px solid var(--gris-clair);border-radius:9px;
  box-shadow:0 12px 30px rgba(42,51,56,.2);max-height:240px;overflow:auto;min-width:200px}
.ac-list div{padding:9px 12px;cursor:pointer;font-size:.9rem;border-bottom:1px solid var(--gris-bg);white-space:nowrap}
.ac-list div:last-child{border-bottom:none}
.ac-list div:hover{background:var(--gris-bg)}
.ac-list .cp{color:var(--teal-dark);font-weight:600;margin-left:6px}
/* offres/demandes rattachées au client */
.lien-row{padding:9px 11px;border:1px solid var(--gris-clair);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:.9rem}
.lien-row:hover{background:var(--gris-bg);border-color:var(--teal)}
.lien-row small{color:var(--gris-fonce);margin-left:6px}
.lien-grp{font-weight:700;font-size:.74rem;letter-spacing:.04em;color:var(--gris-fonce);margin:8px 0 5px}
.ref-thumb{display:block;height:74px;width:116px;object-fit:cover;border-radius:7px;margin-top:9px;box-shadow:0 2px 8px rgba(42,51,56,.25)}
.metro{border:1px solid var(--gris-clair);border-radius:10px;margin-bottom:10px;overflow:hidden}
.metro-h{padding:11px 13px;cursor:pointer;font-weight:normal;color:var(--bleu);display:flex;justify-content:space-between;align-items:center;background:var(--gris-bg)}
.metro-list{display:flex;flex-wrap:wrap;gap:8px;padding:12px 13px}
.metro-chip{padding:7px 12px;border:1.5px solid var(--gris-clair);border-radius:20px;font-size:.85rem;cursor:pointer;background:#fff;transition:.12s}
.metro-chip:hover{border-color:var(--teal)}
.metro-chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.metro-chip.metro-all{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:700}
.metro-chip.metro-clear{color:var(--gris-fonce);border-style:dashed}
.act-list{display:flex;flex-direction:column;gap:10px}
.act-row{border:1px solid var(--gris-clair);border-radius:9px;padding:10px 12px}
.act-meta{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--gris-fonce);margin-bottom:5px}
.act-meta b{color:var(--bleu);font-size:.9rem}
.act-meta .lien{margin-left:auto}
.act-note{font-size:.92rem;white-space:pre-wrap}
/* sélecteur d'équipements (2 volets) */
.equip-wrap{display:flex;min-height:300px}
.equip-left{width:50%;border-right:1px solid var(--gris-clair);padding-right:14px;max-height:58vh;overflow:auto}
.equip-right{width:50%;padding-left:16px;max-height:58vh;overflow:auto}
.equip-right h4{font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--gris-fonce);margin-bottom:8px}
.equip-cat{border:1px solid var(--gris-clair);border-radius:9px;margin-bottom:8px;overflow:hidden}
.equip-cat-h{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;font-weight:600;color:var(--bleu)}
.equip-cat-h:hover,.equip-cat.open .equip-cat-h{background:var(--gris-bg)}
.equip-opts{display:flex;flex-wrap:wrap;gap:8px;padding:10px 13px 13px}
.equip-chip{display:inline-block;padding:7px 12px;border:1.5px solid var(--gris-clair);border-radius:20px;font-size:.85rem;cursor:pointer;transition:.12s;background:#fff;color:var(--noir)}
.equip-chip:hover{border-color:var(--teal)}
.equip-chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.equip-grp{font-weight:700;font-size:.74rem;letter-spacing:.04em;color:var(--teal-dark);text-transform:uppercase;margin:10px 0 6px}
.equip-right .equip-chip{margin:0 6px 6px 0}
@media(max-width:700px){.equip-wrap{flex-direction:column}.equip-left,.equip-right{width:100%;border:none;padding:0;max-height:none}}

@media(max-width:820px){
  .stats{grid-template-columns:1fr 1fr}
  .topnav{padding:0 14px}
  .topnav .brand{width:100%;padding:12px 0 0}
  .topnav nav a{height:48px;padding:0 13px;font-size:.9rem}
  .topnav .who{width:100%;padding:8px 0;justify-content:space-between}
  .content{padding:18px}
  table{font-size:.82rem}th,td{padding:9px 12px}
}
</style>
</head>
<body>

<!-- ============ CONNEXION ============ -->
<div id="login">
  <form class="login-card" onsubmit="seConnecter(event)">
    <div class="logo"><img src="../logo-gtec.png" alt="GTEC" style="height:54px"></div>
    <h1>Espace professionnel</h1>
    <p class="sub">Réservé aux collaborateurs GTEC Immobilier.</p>
    <div class="fld">
      <label>Adresse e-mail</label>
      <input type="email" id="l-email" autocomplete="username" required>
    </div>
    <div class="fld">
      <label>Mot de passe</label>
      <input type="password" id="l-pass" autocomplete="current-password" required>
    </div>
    <button class="btn btn-block" type="submit">Se connecter</button>
    <div class="msg" id="l-msg"></div>
  </form>
</div>

<!-- ============ APPLICATION ============ -->
<div id="app" class="hidden">
  <header class="topnav">
    <div class="brand">GT<b>EC</b> Immobilier</div>
    <nav>
      <a data-vue="dashboard" class="on" onclick="aller('dashboard')">📊 Tableau de bord</a>
      <a data-vue="offres" onclick="aller('offres')">🏢 Offres</a>
      <a data-vue="demandes" onclick="aller('demandes')">🔎 Demandes</a>
      <a data-vue="clients" onclick="aller('clients')">👤 Clients</a>
      <a data-vue="mandats" onclick="aller('mandats')">📄 Mandats</a>
    </nav>
    <div class="who">
      <span class="mail" id="who-mail">…</span>
      <a class="btn btn-ghost btn-sm" href="../index.html" target="_blank">Voir la vitrine ↗</a>
      <button class="btn btn-ghost btn-sm" onclick="seDeconnecter()">Se déconnecter</button>
    </div>
  </header>

  <div class="main">
    <div class="topbar">
      <h2 id="vue-titre">Tableau de bord</h2>
    </div>
    <div class="content" id="content">
      <div class="loading">Chargement…</div>
    </div>
  </div>
</div>

<!-- modales -->
<div id="modal-root"></div>
<div id="modal-root2"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===== CONFIG (même projet Supabase que la vitrine) ===== */
const SUPABASE_URL      = 'https://rqeyadmapekiwzyjtyhv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kSLakua0tOFW8_6tL7W_Tw_Keihe6xW';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const LABELS = {bureaux:'Bureaux', local_commercial:'Local commercial', entrepot_logistique:'Entrepôt / Logistique',
  activite:'Activité', fonds_de_commerce:'Fonds de commerce', terrain:'Terrain'};
const euro = n => n==null ? '—' : new Intl.NumberFormat('fr-FR').format(Math.round(n))+' €';
const ROLE_LABELS = {bailleur:'Bailleur', vendeur:'Vendeur', locataire:'Locataire', acquereur:'Acquéreur', prestataire:'Prestataire', developpeur:'Développeur', franchise:'Franchisé', autre:'Autre',
  /* anciens rôles combinés, gardés pour l'affichage des fiches non encore rouvertes */
  acheteur_locataire:'Preneur / Acquéreur', vendeur_bailleur:'Bailleur / Vendeur', les_deux:'Les deux'};
/* Options du menu déroulant Rôle (dissociées) — réutilisées pour les 2 sélecteurs */
const ROLE_OPTS = [['','—'],['bailleur','Bailleur'],['vendeur','Vendeur'],['locataire','Locataire'],['acquereur','Acquéreur'],['prestataire','Prestataire'],['developpeur','Développeur'],['franchise','Franchisé'],['autre','Autre']];
/* Rôles d'un client sous forme de tableau (gère l'ancien champ unique) */
const clientRoles = c => (c && c.roles && c.roles.length) ? c.roles : (c && c.role ? [c.role] : []);
/* Secteurs / quartiers proposés dans la fiche bien (menu déroulant) */
const SECTEURS = ['Pôle Jules Verne','Blanche Tâche Camon','Grand Riez Cagny','ZI Nord Amiens','Village Oasis Dury','Vallée des Vignes','Zac Intercampus','Bornes du Temps','Zac Haute Borne','ZA le Capron Saleux','Zone Montières','Centre ville Amiens'];
/* Code couleur des références par type de bien */
const TYPE_COULEUR = {
  bureaux:            {bg:'rgba(30,80,140,.14)',  color:'#1e508c'}, // bleu
  local_commercial:   {bg:'rgba(46,125,50,.15)',  color:'#2e7d32'}, // vert (commerces)
  fonds_de_commerce:  {bg:'rgba(46,125,50,.15)',  color:'#2e7d32'}, // vert (commerces)
  activite:           {bg:'rgba(200,160,0,.20)',  color:'#8a6d00'}, // jaune
  entrepot_logistique:{bg:'rgba(90,100,112,.16)', color:'#566270'}, // gris (logistique)
  terrain:            {bg:'rgba(124,58,237,.15)', color:'#6d28d9'}, // violet
};
function refBadge(ref, type){
  const c=TYPE_COULEUR[type];
  return `<span class="tag" style="${c?`background:${c.bg};color:${c.color};`:''}font-weight:700">${esc(ref||'—')}</span>`;
}
/* ----- Agent rédacteur (FB / VDM) ----- */
const AGENTS_OPTS = [['VDM','VDM'],['FB','FB']];
let ME_AGENT = 'FB';   // pré-sélection selon l'utilisateur connecté (défini à la connexion)
function agentBadge(a){
  if(a!=='VDM' && a!=='FB') return '<span class="tag" style="background:var(--gris-clair);color:var(--gris-fonce);font-weight:700;font-size:.68rem">—</span>';
  const bg = a==='VDM' ? '#1A2738' : '#3D8074';   // marine pour VDM, vert d'eau pour FB
  return `<span class="tag" title="Annonce gérée par ${a}" style="background:${bg};color:#fff;font-weight:700;font-size:.68rem">${a}</span>`;
}
/* Radio FB / VDM dans un formulaire (name = id) */
function fAgent(name, v){
  v = (v==='VDM'||v==='FB') ? v : ME_AGENT;
  const opt = (code,label)=>`<label style="display:inline-flex;align-items:center;gap:7px;font-weight:600;cursor:pointer;text-transform:none;letter-spacing:normal"><input type="radio" name="${name}" value="${code}" ${v===code?'checked':''} style="width:auto;flex:none;margin:0"> ${label}</label>`;
  return `<div class="f full"><label>Annonce gérée par</label><div style="display:flex;gap:26px;align-items:center;padding-top:4px;flex-wrap:wrap">${AGENTS_OPTS.map(([c,l])=>opt(c,l)).join('')}</div></div>`;
}
function radioVal(name){ const el=document.querySelector(`input[name="${name}"]:checked`); return el?el.value:null; }
function typeBadge(type){
  const c=TYPE_COULEUR[type];
  return `<span class="tag" style="${c?`background:${c.bg};color:${c.color};`:''}font-weight:600">${LABELS[type]||'—'}</span>`;
}
const URGENCE = {
  fort:  {label:'Fort (0–3 mois)',     color:'#1b5e20', bg:'rgba(46,125,50,.24)'},
  moyen: {label:'Moyen (3–6 mois)',    color:'#c2410c', bg:'rgba(194,65,12,.13)'},
  faible:{label:'Faible (6 mois et +)',color:'#a98300', bg:'rgba(180,140,0,.18)'},
};
function urgenceBadge(u){ const U=URGENCE[u]; return U
  ? `<span class="tag" style="background:${U.bg};color:${U.color};font-weight:700">${U.label.replace(/\s*\(.*\)\s*/,'')}</span>` : '—'; }
const AMIENS_METRO = [
  ['Amiens','80000'],['Longueau','80330'],['Camon','80450'],['Dury','80480'],['Boves','80440'],
  ['Cagny','80330'],['Saleux','80480'],['Salouël','80480'],['Pont-de-Metz','80480'],['Rivery','80136']
];
/* résumé compact des localités d'une demande (regroupe la métropole) */
function localitesResume(locs){
  const villes=(locs||[]).map(l=>(l.ville||'').trim()).filter(Boolean);
  if(!villes.length) return '—';
  const metro=AMIENS_METRO.map(([v])=>v.toLowerCase());
  const dansMetro=villes.filter(v=>metro.includes(v.toLowerCase()));
  const autres=villes.filter(v=>!metro.includes(v.toLowerCase()));
  const parts=[];
  if(dansMetro.length) parts.push(dansMetro.length===AMIENS_METRO.length ? 'Amiens Métropole' : `Amiens Métropole (${dansMetro.length}/${AMIENS_METRO.length})`);
  parts.push(...autres);
  return parts.join(', ');
}
const HONO_30 = '30 % HT du montant du loyer annuel hors-taxes, hors charges';
const HONO_20 = '20 % HT du montant du loyer annuel hors-taxes, hors charges';
const HONO_15 = '15 % HT du montant du loyer annuel hors-taxes, hors charges';
const HONO_10 = '10 % HT du montant du loyer annuel hors-taxes, hors charges';
/* Honoraires : texte stocké <-> [type, montant forfaitaire] */
function honoParse(h){
  if(h===HONO_30) return ['p30',''];
  if(h===HONO_20) return ['p20',''];
  if(h===HONO_15) return ['p15',''];
  if(h===HONO_10) return ['p10',''];
  if(h) return ['forfait',(String(h).match(/[\d.,]+/)||[''])[0].replace(/\s/g,'').replace(',','.')];
  return ['',''];
}
function honoText(type,mt){
  return type==='p30'?HONO_30 : type==='p20'?HONO_20 : type==='p15'?HONO_15 : type==='p10'?HONO_10
    : type==='forfait'?(mt!=null?'Forfait : '+new Intl.NumberFormat('fr-FR').format(mt)+' €':'Montant forfaitaire') : null;
}

/* Cœur du projet : appel de la fonction de matching en base */
async function rapprocher(demandeId){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)fermerModal()"><div class="modal">
    <div class="modal-h"><h3>Biens correspondants</h3><button class="x" onclick="fermerModal()">×</button></div>
    <div class="modal-b" id="modal-b"><div class="loading">Recherche des biens…</div></div></div></div>`;
  const { data, error } = await sb.rpc('match_offres_pour_demande', { p_demande: demandeId });
  const b = document.getElementById('modal-b');
  if(error){ b.innerHTML = `<div class="empty">Erreur : ${esc(error.message)}<br><small>(nom du paramètre de la fonction à ajuster si besoin)</small></div>`; return; }
  if(!data || !data.length){ b.innerHTML = vide('Aucun bien ne correspond à cette demande pour l’instant.'); return; }
  b.innerHTML = data.map(m=>{
    const sc = m.score ?? m.score_pertinence ?? m.pertinence;
    const cls = sc>=80?'':sc>=50?'mid':'low';
    const eca = m.etiquettes||m.ecarts||m.labels;
    const ecaHtml = Array.isArray(eca)?eca.map(e=>`<span class="tag">${esc(e)}</span>`).join('')
      : eca?`<span class="tag">${esc(eca)}</span>`:'';
    return `<div class="match">
      <div class="score ${cls}">${sc!=null?Math.round(sc):'—'}</div>
      <div class="info">
        <b>${esc(m.reference||'')} ${esc(m.titre||LABELS[m.type_bien]||'Bien')}</b>
        <div style="color:var(--gris-fonce);font-size:.88rem">${esc(m.ville||'')}${m.surface_m2?' · '+esc(m.surface_m2)+' m²':''}</div>
        <div class="ecarts">${ecaHtml}</div>
      </div></div>`;
  }).join('');
}

/* Lecture des champs */
const val = id => { const el=document.getElementById(id); if(!el) return null; if(el.type==='checkbox') return el.checked;
  const v=(el.value||'').trim(); return v===''?null:v; };
const numVal = id => { const v=val(id); return v==null?null:Number(v); };
/* Casse cohérente : 1re lettre majuscule, reste en minuscule */
const capStr = s => { s=(s==null?'':String(s)).trim(); return s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : ''; };
const cap = id => { const v=val(id); return v==null?null:capStr(v); };
/* Villes : une majuscule à chaque mot (Saint-Sauveur, La Rochelle) */
const titleStr = s => { s=(s==null?'':String(s)).trim().toLowerCase(); return s.replace(/(^|[\s\-'’])(\p{L})/gu,(m,sep,ch)=>sep+ch.toUpperCase()); };
const capTitle = id => { const v=val(id); return v==null?null:titleStr(v); };
/* Téléphone : groupes de 2 chiffres séparés d'un espace (06 12 34 56 78) */
function formatTel(s){ if(s==null) return s; const v=String(s).trim(); const plus=v.startsWith('+')?'+':'';
  const digits=v.replace(/\D/g,''); if(!digits) return v||null; return (plus+(digits.match(/.{1,2}/g)||[]).join(' ')).trim(); }
const telVal = id => { const v=val(id); return v==null?null:formatTel(v); };

/* Autocomplétion ville → code postal (API officielle geo.api.gouv.fr, gratuite, sans clé) */
let acTimer=null, acBox=null;
function fermerAuto(){ if(acBox){ acBox.remove(); acBox=null; } }
function brancherVilleAuto(villeEl, getCpEl, multi){
  if(!villeEl) return;
  villeEl.setAttribute('autocomplete','off');
  villeEl.addEventListener('input', ()=>{
    const q=villeEl.value.trim(); clearTimeout(acTimer); fermerAuto();
    if(q.length<2) return;
    acTimer=setTimeout(()=>chercherCommunes(q, villeEl, getCpEl, multi), 250);
  });
  villeEl.addEventListener('blur', ()=>setTimeout(fermerAuto, 180));
}
async function chercherCommunes(q, villeEl, getCpEl, multi){
  let communes=[];
  try{
    const r=await fetch('https://geo.api.gouv.fr/communes?nom='+encodeURIComponent(q)+'&fields=nom,codesPostaux&boost=population&limit=6');
    communes=await r.json();
  }catch(e){ return; }
  if(!Array.isArray(communes)) return;
  const rows=[];
  communes.slice(0,6).forEach(c=>{
    const cps=c.codesPostaux||[];
    if(multi){
      // une seule entrée par ville (regroupe tous ses codes sous le 1er)
      rows.push(`<div data-nom="${esc(c.nom)}" data-cp="${esc(cps[0]||'')}">${esc(c.nom)}<span class="cp">${esc(cps[0]||'')}</span></div>`);
    } else {
      cps.forEach(cp=> rows.push(`<div data-nom="${esc(c.nom)}" data-cp="${esc(cp)}">${esc(c.nom)}<span class="cp">${esc(cp)}</span></div>`));
    }
  });
  const liste=rows.slice(0,12);
  fermerAuto();
  if(!liste.length) return;
  acBox=document.createElement('div'); acBox.className='ac-list';
  acBox.innerHTML=liste.join('');
  const cont = villeEl.closest('.f') || villeEl.parentElement;
  cont.style.position='relative';
  acBox.style.top=(villeEl.offsetTop+villeEl.offsetHeight+2)+'px';
  acBox.style.left=villeEl.offsetLeft+'px';
  acBox.style.width=Math.max(villeEl.offsetWidth,200)+'px';
  cont.appendChild(acBox);
  acBox.querySelectorAll('div').forEach(d=>d.addEventListener('mousedown', e=>{
    e.preventDefault();
    villeEl.value=d.dataset.nom; const cpEl=getCpEl&&getCpEl(); if(cpEl) cpEl.value=d.dataset.cp||'';
    fermerAuto();
  }));
}

/* Traduit le code officiel "catégorie juridique" (INSEE) en forme lisible */
function formeJuridique(code){
  code=String(code||'');
  if(!code) return '';
  if(code==='5720') return 'SASU';
  if(code==='6540') return 'SCI';
  if(code==='5202') return 'SNC';
  if(code==='1000') return 'Entrepreneur individuel';
  if(code.startsWith('54')) return 'SARL';
  if(code.startsWith('57')) return 'SAS';
  if(code.startsWith('55')||code.startsWith('56')) return 'SA';
  if(code.startsWith('65')) return 'Société civile';
  if(code.startsWith('62')) return 'GIE';
  if(code.startsWith('92')||code.startsWith('93')) return 'Association';
  return '';
}
function remplirEntreprise(e){
  if(!e) return;
  const sg=e.siege||{};
  const setV=(id,v)=>{ const el=document.getElementById(id); if(el && v!=null && v!=='') el.value=v; };
  const tsel=document.getElementById('c-type'); if(tsel) tsel.value='societe';
  setV('c-forme', formeJuridique(e.nature_juridique));
  setV('c-raison', e.nom_complet||e.nom_raison_sociale||'');
  setV('c-siret', sg.siret||'');
  const dir=(e.dirigeants||[]).find(d=> d.type_dirigeant==='personne physique' || d.prenoms || d.nom);
  if(dir){
    if(dir.nom) setV('c-nom', titleStr(dir.nom));
    if(dir.prenoms) setV('c-prenom', titleStr(dir.prenoms));
    if(dir.qualite) setV('c-fonction', capStr(dir.qualite));
  }
  const ligneAdr = sg.adresse || [[sg.numero_voie, sg.type_voie, sg.libelle_voie].filter(Boolean).join(' '), [sg.code_postal, sg.libelle_commune].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  setV('c-adresse', ligneAdr);
  const rech=document.getElementById('c-recherche'); if(rech) rech.value='';
}

/* ===== Brouillon automatique (anti-perte au rechargement) ===== */
const DRAFT_KEY = 'gtec_crm_draft';
let CURRENT_FORM_KEY = null;
function draftCollect(key){
  if(!key) return;
  const data={};
  document.querySelectorAll('#cform [id]').forEach(el=>{ if(el.type==='file') return; data[el.id] = el.type==='checkbox' ? el.checked : el.value; });
  const extra={};
  if(document.getElementById('o-equip-summary')) extra.equip = EQUIP_SEL;
  if(document.getElementById('loc-list')) extra.locs = [...document.querySelectorAll('#loc-list .loc-row')]
    .map(r=>({ville:r.querySelector('.loc-ville').value, cp:r.querySelector('.loc-cp').value}));
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({key, data, extra})); }catch(e){}
}
function draftClear(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} }
function draftGet(){ try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)); }catch(e){ return null; } }
function draftApply(key){
  const d=draftGet(); if(!d || d.key!==key) return;
  Object.entries(d.data||{}).forEach(([id,v])=>{ const el=document.getElementById(id); if(!el||el.type==='file') return;
    if(el.type==='checkbox') el.checked=v; else el.value=v; });
  if(d.extra && d.extra.equip){ EQUIP_SEL = JSON.parse(JSON.stringify(d.extra.equip)); majEquipSummary(); }
  if(d.extra && d.extra.locs && document.getElementById('loc-list')){
    const list=document.getElementById('loc-list'); list.innerHTML='';
    (d.extra.locs.length?d.extra.locs:[{}]).forEach(l=>ajouterLoc(l.ville,l.cp));
  }
  if(document.getElementById('o-hono-type1')) majHonoraires();
}
function reouvrirDraft(){
  const d=draftGet(); if(!d || !d.key) return;
  const [ent,idp]=d.key.split(':'); const id = idp!=='new'?idp:null;
  if(ent==='client') id?editClient(id):nouveauClient();
  else if(ent==='offre') id?editOffre(id):nouvelleOffre();
  else if(ent==='demande') id?editDemande(id):nouvelleDemande();
  else if(ent==='mandat') id?editMandat(id):nouveauMandat();
}

/* Modale de formulaire générique (onDelete optionnel = bouton Supprimer) */
function ouvrirForm(titre, corpsHtml, onSubmit, onDelete, formKey, archiveOpt){
  CURRENT_FORM_KEY = formKey || null;
  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)fermerModal()"><div class="modal">
    <div class="modal-h"><h3>${esc(titre)}</h3><button class="x" onclick="fermerModal()">×</button></div>
    <form id="cform"><div class="modal-f">${corpsHtml}</div>
      <div class="modal-foot">
        <span style="display:flex;align-items:center;gap:14px">
          ${onDelete?'<button type="button" class="btn btn-danger btn-sm" id="cform-del">Supprimer</button>':''}
          ${archiveOpt?`<button type="button" class="btn btn-ghost btn-sm" id="cform-arch">${archiveOpt.archived?'Désarchiver':'Archiver'}</button>`:''}
          <span class="form-msg" id="cform-msg"></span>
        </span>
        <span><button type="button" class="btn btn-ghost btn-sm" onclick="fermerModal()">Annuler</button>
        <button type="submit" class="btn btn-sm">Enregistrer</button></span>
      </div></form></div></div>`;
  const form=document.getElementById('cform');
  if(formKey){ const sd=()=>draftCollect(formKey); form.addEventListener('input', sd); form.addEventListener('change', sd); }
  form.addEventListener('focusout', e=>{ const t=e.target; if(!t.classList) return;
    if(t.classList.contains('cap-title')) t.value=titleStr(t.value);
    else if(t.classList.contains('cap')) t.value=capStr(t.value);
    else if(t.classList.contains('tel')) t.value=formatTel(t.value)||''; });
  form.addEventListener('submit', async e=>{
    e.preventDefault();
    const msg=document.getElementById('cform-msg'); msg.className='form-msg'; msg.textContent='Enregistrement…';
    try{ await onSubmit(); fermerModal(); }
    catch(err){ msg.className='form-msg err'; msg.textContent='Erreur : '+(err.message||err); }
  });
  if(onDelete){
    document.getElementById('cform-del').addEventListener('click', async ()=>{
      if(!confirm('Supprimer définitivement cette fiche ? Cette action est irréversible.')) return;
      const msg=document.getElementById('cform-msg'); msg.className='form-msg'; msg.textContent='Suppression…';
      try{ await onDelete(); fermerModal(); }
      catch(err){ msg.className='form-msg err'; msg.textContent='Suppression impossible : '+(err.message||err); }
    });
  }

    document.getElementById('cform-arch').addEventListener('click', async ()=>{

      msg.textContent=archiveOpt.archived?'Désarchivage…':'Archivage…';

    });

}

/* envoie un fichier dans le bucket "offres" et renvoie son URL publique */
async function uploadMediaOffre(file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path='media_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
  const up=await sb.storage.from('offres').upload(path, file, {cacheControl:'3600'});
  if(up.error) throw up.error;
  return sb.storage.from('offres').getPublicUrl(path).data.publicUrl;
}

  MEDIA_OFFRE_ID = offreId || null;
  DOSSIER_PLANS = Array.isArray(plansUrls) ? plansUrls.slice() : [];
  DOSSIER_PHOTOS = [];
  renderMediaDossier();
  if(MEDIA_OFFRE_ID){
    sb.from('offre_photos').select('id,url').eq('offre_id',MEDIA_OFFRE_ID).then(({data})=>{

function renderMediaDossier(){
  const w=document.getElementById('o-media-dossier'); if(!w) return;
  if(!MEDIA_OFFRE_ID){
    w.innerHTML = '<p style="color:#888;font-style:italic">Enregistrez d\'abord le bien, puis rouvrez-le pour ajouter photos et plans.</p>';
    return;
  }
  const galP = DOSSIER_PHOTOS.map(p=>thumbMini(p.url,`supprimerPhotoDossier('${p.id}')`)).join('') || '<span style="color:#888;font-style:italic">aucune photo</span>';
  const galPl = DOSSIER_PLANS.map((u,i)=>thumbMini(u,`supprimerPlanDossier(${i})`)).join('') || '<span style="color:#888;font-style:italic">aucun plan</span>';
  w.innerHTML = `
    <label>Photos du bien</label>

async function ajouterPhotosDossier(){
  if(!MEDIA_OFFRE_ID) return;
  const files=[...document.getElementById('o-photos-add').files]; if(!files.length) return;
  try{
    for(const f of files){
      const url=await uploadMediaOffre(f);
      const {data,error}=await sb.from('offre_photos')
        .insert({offre_id:MEDIA_OFFRE_ID,url,est_principale:false,ordre:DOSSIER_PHOTOS.length})
        .select('id,url').single();
      if(error) throw error; DOSSIER_PHOTOS.push(data);
    }
  }catch(e){ alert('Échec de l\'ajout : '+(e.message||e)); }
  renderMediaDossier();
}
async function supprimerPhotoDossier(id){
  const p=DOSSIER_PHOTOS.find(x=>x.id===id); if(!p) return;
  if(!confirm('Supprimer cette photo ?')) return;
  try{ await supprimerCoverStorage(p.url); await sb.from('offre_photos').delete().eq('id',id);
    DOSSIER_PHOTOS=DOSSIER_PHOTOS.filter(x=>x.id!==id); renderMediaDossier();
  }catch(e){ alert('Échec : '+(e.message||e)); }
}
async function ajouterPlansDossier(){
  if(!MEDIA_OFFRE_ID) return;
  const files=[...document.getElementById('o-plans-add').files]; if(!files.length) return;
  try{
    for(const f of files){ const url=await uploadMediaOffre(f); DOSSIER_PLANS.push(url); }
    await save('offres', MEDIA_OFFRE_ID, {plans_urls:DOSSIER_PLANS});
  }catch(e){ alert('Échec de l\'ajout : '+(e.message||e)); }
  renderMediaDossier();
}
async function supprimerPlanDossier(i){
  const url=DOSSIER_PLANS[i]; if(url==null) return;
  if(!confirm('Supprimer ce plan ?')) return;
  try{ await supprimerCoverStorage(url); DOSSIER_PLANS.splice(i,1);
    await save('offres', MEDIA_OFFRE_ID, {plans_urls:DOSSIER_PLANS}); renderMediaDossier();
  }catch(e){ alert('Échec : '+(e.message||e)); }
}

          <option value="NET HC" ${rec.loyer_type==='NET HC'?'selected':''}>NET HC</option>
        </select>
      </div>
      <div id="o-loyer-an" style="font-size:.8rem;font-weight:600;color:var(--teal-dark);margin-top:4px"></div></div>
    ${fNum('o-charges','Charges (€ / mensuel)',rec.charges)}
    ${fNum('o-tf','Taxe foncière (€ / mensuel)',rec.taxe_fonciere)}
    ${fNum('o-dab','Droit au bail (€)',rec.droit_au_bail)}
    ${honoLigne('1',ht1,hm1,rec.honoraires_charge)}
    ${honoLigne('2',ht2,hm2,rec.honoraires_charge_2)}
    ${fSel('o-depot','Dépôt de garantie',rec.depot_garantie||'',[['','—'],['1 mois de loyer hors-taxes, hors charges','1 mois de loyer HT HC'],['2 mois de loyer hors-taxes, hors charges','2 mois de loyer HT HC'],['3 mois de loyer hors-taxes, hors charges','3 mois de loyer HT HC']])}
    ${fSel('o-bail','Type de bail',rec.bail||'Commercial 3/6/9 ans',[['Commercial 3/6/9 ans','Commercial 3/6/9 ans'],['Dérogatoire (précaire)','Dérogatoire (précaire)'],['Professionnel','Professionnel']])}
    ${fSel('o-indexation','Indexation annuelle',rec.indexation||'ILAT',[['ILAT','ILAT'],['ILC','ILC'],['ICC','ICC']])}
    ${fSel('o-regime','Régime fiscal',rec.regime_fiscal||'TVA',[['TVA','Assujetti TVA'],['Exonéré de TVA','Exonéré de TVA']])}
    ${fSel('o-periodicite','Périodicité de paiement',rec.periodicite_paiement||'Trimestriellement ou mensuellement',[['Trimestriellement ou mensuellement','Trimestriellement ou mensuellement'],['Mensuellement','Mensuellement'],['Trimestriellement','Trimestriellement']],{full:true})}
    ${fSep('Équipements')}
    <div class="full"><button type="button" class="btn btn-ghost btn-sm" onclick="ouvrirEquip()">＋ Gérer les équipements</button>
      <div id="o-equip-summary" style="margin-top:10px;font-size:.9rem"></div></div>
    ${fSep('Vitrine & rattachement')}
    ${fArea('o-desc','Description',rec.description)}
    <div class="full" style="margin-top:-8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button type="button" class="btn btn-ghost btn-sm" onclick="genererDescriptifOffre()">✍️ Générer le descriptif</button>
      <span style="font-size:.8rem;color:var(--gris-fonce)">Rédige la description à partir des infos saisies — modifiable ensuite.</span>
    </div>
    ${fSel('o-dispo','Disponibilité',rec.disponibilite||'',[['','—'],['Disponibilité immédiate','Disponibilité immédiate'],['Nous consulter','Nous consulter']],{full:true})}
    ${fText('o-plan','Lien vers les documents (Drive)',rec.plan_url)}
    <div class="f full"><label>Client propriétaire</label><select id="o-client">${optClients(rec.client_id)}</select></div>
    ${fCheck('o-pub','Publier sur la vitrine',rec.publie)}
    ${fSep('Photo de couverture')}
    <div class="full">
      <input id="o-cover-file" type="file" accept="image/*" onchange="apercuCover()">
      <div id="o-cover-preview" style="margin-top:10px"></div>
    </div>
    ${fSep('Dossier — Localisation (cartes Google Maps)')}
    <div class="f"><label>Carte — plan de localisation</label>
      <input id="o-carte1" type="file" accept="image/*" onchange="apercuCarte(1)">
      <div id="o-carte1-preview" style="margin-top:8px"></div></div>
    <div class="f"><label>Carte — vue aérienne</label>
      <input id="o-carte2" type="file" accept="image/*" onchange="apercuCarte(2)">
      <div id="o-carte2-preview" style="margin-top:8px"></div></div>
    ${fSep('Dossier — Photos & plans')}
    <div class="full" id="o-media-dossier"></div>
  </div>`;
  ouvrirForm(rec.id?'Modifier le bien':'Nouveau bien', corps, async()=>{
    const honoraires = honoText(val('o-hono-type1'), numVal('o-hono-montant1'));
    const honoraires_2 = honoText(val('o-hono-type2'), numVal('o-hono-montant2'));
    let cover_url = rec.cover_url || null;
    if(COVER_FILE){
      if(rec.cover_url) await supprimerCoverStorage(rec.cover_url);   // remplace l'ancienne
      const ext=(COVER_FILE.name.split('.').pop()||'jpg').toLowerCase();
      const path='cover_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
      const up=await sb.storage.from('offres').upload(path, COVER_FILE, {cacheControl:'3600'});
      if(up.error) throw up.error;
      cover_url = sb.storage.from('offres').getPublicUrl(path).data.publicUrl;
    } else if(COVER_REMOVE){
      if(rec.cover_url) await supprimerCoverStorage(rec.cover_url);
      cover_url = null;
    }
    // Cartes de localisation du dossier
    let carte_plan_url = rec.carte_plan_url || null;
    if(CARTE1_FILE){ if(rec.carte_plan_url) await supprimerCoverStorage(rec.carte_plan_url); carte_plan_url = await uploadMediaOffre(CARTE1_FILE); }
    else if(CARTE1_REMOVE){ if(rec.carte_plan_url) await supprimerCoverStorage(rec.carte_plan_url); carte_plan_url = null; }
    let carte_aerienne_url = rec.carte_aerienne_url || null;
    if(CARTE2_FILE){ if(rec.carte_aerienne_url) await supprimerCoverStorage(rec.carte_aerienne_url); carte_aerienne_url = await uploadMediaOffre(CARTE2_FILE); }
    else if(CARTE2_REMOVE){ if(rec.carte_aerienne_url) await supprimerCoverStorage(rec.carte_aerienne_url); carte_aerienne_url = null; }
    await save('offres', rec.id, { agent:radioVal('o-agent')||ME_AGENT, type_bien:val('o-type'), transaction:val('o-trans'), statut:val('o-statut'),
      bail:val('o-bail'), indexation:val('o-indexation'), regime_fiscal:val('o-regime'), periodicite_paiement:val('o-periodicite'),
      carte_plan_url, carte_aerienne_url,
      titre:val('o-titre'), adresse:val('o-adresse'), ville:cap('o-ville'), code_postal:val('o-cp'), secteur:val('o-secteur'),
      surface_m2:numVal('o-surf'), surface_min_m2:numVal('o-smin'), surface_max_m2:numVal('o-smax'), nb_lots:numVal('o-lots'),
      parkings:numVal('o-park'), etage:val('o-etage'), nb_niveaux:numVal('o-niv'), annee:numVal('o-annee'),
      dpe:val('o-dpe'), etat:val('o-etat'), divisible:val('o-div'), norme_pmr:val('o-pmr'), norme_erp:val('o-erp'),
      prix_vente:numVal('o-prix'), loyer_annuel_m2:numVal('o-loyer'), charges:numVal('o-charges'),
      taxe_fonciere:numVal('o-tf'), droit_au_bail:numVal('o-dab'), honoraires, honoraires_2,
      honoraires_charge:val('o-hono-charge1'), honoraires_charge_2:val('o-hono-charge2'), depot_garantie:val('o-depot'),
      description:val('o-desc'), disponibilite:val('o-dispo'), plan_url:val('o-plan'),
      loyer_type:val('o-loyer-type'),
      client_id:val('o-client'), publie:(val('o-pub')?true:null), equipements:EQUIP_SEL, cover_url });
    vueOffres();
  }, rec.id ? async()=>{ if(rec.cover_url) await supprimerCoverStorage(rec.cover_url); await sb.from('offre_photos').delete().eq('offre_id', rec.id); await sb.from('actions').delete().eq('cible_type','offre').eq('cible_id',rec.id); await del('offres', rec.id); vueOffres(); } : null, 'offre:'+(rec.id||'new'),
    rec.id ? {archived:!!rec.archive, toggle:async()=>{ await save('offres', rec.id, {archive:!rec.archive}); vueOffres(); }} : null);
  brancherVilleAuto(document.getElementById('o-ville'), ()=>document.getElementById('o-cp'));
  brancherAdresseAuto(document.getElementById('o-adresse'));
  majEquipSummary();
  if(rec.cover_url) showCoverPreview(rec.cover_url);
  if(rec.carte_plan_url) showCartePreview(1, rec.carte_plan_url);
  if(rec.carte_aerienne_url) showCartePreview(2, rec.carte_aerienne_url);
  initMediaDossier(rec.id, rec.plans_urls);
  draftApply('offre:'+(rec.id||'new'));
  majAnnuel('o-loyer','o-loyer-an');
}

/* ----- DEMANDE (+ localités + critères) ----- */
async function nouvelleDemande(){ await chargerClients(); formDemande(); }
async function editDemande(id){ await chargerClients();
  let rec=DEMANDES.find(d=>d.id===id);
  if(!rec){ const { data } = await sb.from('demandes').select('*, demande_localites(ville,code_postal)').eq('id',id).single(); rec=data; }
  formDemande(rec);
}
function formDemande(rec){
  rec=rec||{};
  const crit=rec.criteres_secondaires||{};
  const typesChecks = Object.entries(LABELS).map(([k,l])=>`<label style="display:flex;align-items:center;gap:9px;font-size:.9rem;font-weight:500;text-transform:none;letter-spacing:normal;color:var(--noir);padding:9px 12px;border:1.5px solid var(--gris-clair);border-radius:9px;cursor:pointer">
    <input type="checkbox" id="dt-${k}" ${(rec.types_bien||[]).includes(k)?'checked':''} style="width:auto;flex:none;margin:0"> <span>${l}</span></label>`).join('');
  const corps=`<div class="form-grid">
    ${fAgent('d-agent',rec.agent)}
    <div class="f full"><label>Client</label><select id="d-client">${optClients(rec.client_id)}</select></div>
    ${fSel('d-trans','Transaction',rec.transaction||'achat',[['achat','Achat'],['location','Location'],['les_deux','Les deux']])}
    ${fSel('d-statut','Statut',rec.statut||'active',[['active','Active'],['cloturee','Clôturée']])}
    <div class="f full"><label>Type(s) de bien recherché(s)</label><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:2px">${typesChecks}</div></div>
    ${fNum('d-smin','Surface mini (m²)',rec.surface_min_m2)}
    ${fNum('d-smax','Surface maxi (m²)',rec.surface_max_m2)}
    <div class="f full"><label>Budget max (loyer mensuel, ou prix d'achat)</label>
      <input id="d-budget" type="number" value="${rec.budget_max==null?'':rec.budget_max}" oninput="majAnnuel('d-budget','d-budget-an')">
      <div id="d-budget-an" style="font-size:.8rem;font-weight:600;color:var(--teal-dark);margin-top:4px"></div></div>
    ${fNum('d-tolb','Tolérance budget (%)',rec.tolerance_budget_pct!=null?rec.tolerance_budget_pct:15)}
    ${fNum('d-tols','Tolérance surface (%)',rec.tolerance_surface_pct!=null?rec.tolerance_surface_pct:15)}
    ${fSel('d-urgence','Urgence',rec.urgence||'',[['','—'],['fort','Fort (0–3 mois)'],['moyen','Moyen (3–6 mois)'],['faible','Faible (6 mois et +)']])}
    <div class="f"></div>
    <div class="f full"><label>Parking</label>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <label style="display:inline-flex;align-items:center;gap:7px;font-weight:500"><input type="checkbox" id="d-park" ${crit.parking?'checked':''}> Souhaité</label>
        <input type="number" id="d-park-nb" min="0" placeholder="Nb de places souhaitées (priorité)" style="flex:1;min-width:170px" value="${crit.parking_places!=null?crit.parking_places:''}">
      </div></div>
    ${fCheck('d-pmr','Accessibilité PMR',crit.pmr)}
    ${fSep('Localités souhaitées')}
    <div class="full">
      <div class="metro">
        <div class="metro-h" onclick="toggleMetro()">📍 Amiens Métropole — sélectionner les communes <span id="metro-chev">▸</span></div>
        <div id="metro-list" class="metro-list" style="display:none">
          <span class="metro-chip metro-all" onclick="toutMetro()">✓ Toute la métropole</span>
          <span class="metro-chip metro-clear" onclick="viderMetro()">✗ Tout enlever</span>
          ${AMIENS_METRO.map(([v,cp])=>`<span class="metro-chip" data-v="${esc(v)}" onclick="ajouterVilleMetro('${esc(v)}','${cp}')">${esc(v)}</span>`).join('')}
        </div>
      </div>
      <div id="loc-list"></div>
      <button type="button" class="lien" onclick="ajouterLoc()">+ Ajouter une autre ville</button>
    </div>
  </div>`;
  ouvrirForm(rec.id?'Modifier la demande':'Nouvelle demande', corps, ()=>saveDemande(rec),
    rec.id ? async()=>{ await sb.from('demande_localites').delete().eq('demande_id', rec.id); await sb.from('actions').delete().eq('cible_type','demande').eq('cible_id',rec.id); await del('demandes', rec.id); vueDemandes(); } : null,
    'demande:'+(rec.id||'new'),
    rec.id ? {archived:!!rec.archive, toggle:async()=>{ await save('demandes', rec.id, {archive:!rec.archive}); vueDemandes(); }} : null);
  const locsInit = (rec.demande_localites && rec.demande_localites.length)
    ? rec.demande_localites
    : [{ville:'', code_postal:''}];   // nouvelle demande : un champ ville vide (plus de métropole pré-cochée)
  locsInit.forEach(l=>ajouterLoc(l.ville, l.code_postal));
  draftApply('demande:'+(rec.id||'new'));
  majAnnuel('d-budget','d-budget-an');
  majMetroChips();
}
function ajouterLoc(ville,cp){
  const div=document.createElement('div'); div.className='loc-row';
  div.innerHTML=`<input class="loc-ville cap-title" placeholder="Ville" value="${ville?esc(ville):''}">
    <input class="loc-cp" placeholder="CP" style="max-width:110px" value="${cp?esc(cp):''}">
    <button type="button" class="lien" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('loc-list').appendChild(div);
  brancherVilleAuto(div.querySelector('.loc-ville'), ()=>div.querySelector('.loc-cp'), true);
}
function toggleMetro(){ const l=document.getElementById('metro-list'); const open=l.style.display==='none';
  l.style.display=open?'flex':'none'; document.getElementById('metro-chev').textContent=open?'▾':'▸'; }
function ajouterVilleMetro(v,cp){
  const rows=[...document.querySelectorAll('#loc-list .loc-row')];
  const ex=rows.find(r=>(r.querySelector('.loc-ville').value||'').trim().toLowerCase()===v.toLowerCase());
  if(ex) ex.remove(); else ajouterLoc(v,cp);
  majMetroChips();
  draftCollect(CURRENT_FORM_KEY);
}
function majMetroChips(){
  const villes=[...document.querySelectorAll('#loc-list .loc-ville')].map(i=>(i.value||'').trim().toLowerCase());
  document.querySelectorAll('.metro-chip[data-v]').forEach(ch=>ch.classList.toggle('on', villes.includes((ch.dataset.v||'').toLowerCase())));
}
function toutMetro(){
  AMIENS_METRO.forEach(([v,cp])=>{
    const ex=[...document.querySelectorAll('#loc-list .loc-row')].find(r=>(r.querySelector('.loc-ville').value||'').trim().toLowerCase()===v.toLowerCase());
    if(!ex) ajouterLoc(v,cp);
  });
  // retire d'éventuelles lignes ville vides
  [...document.querySelectorAll('#loc-list .loc-row')].forEach(r=>{
    if(!(r.querySelector('.loc-ville').value||'').trim() && !(r.querySelector('.loc-cp').value||'').trim()) r.remove();
  });
  majMetroChips(); draftCollect(CURRENT_FORM_KEY);
}
function viderMetro(){
  const metro=AMIENS_METRO.map(([v])=>v.toLowerCase());
  [...document.querySelectorAll('#loc-list .loc-row')].forEach(r=>{
    if(metro.includes((r.querySelector('.loc-ville').value||'').trim().toLowerCase())) r.remove();
  });
  majMetroChips(); draftCollect(CURRENT_FORM_KEY);
}
async function saveDemande(rec){
  const payload={ agent:radioVal('d-agent')||ME_AGENT, client_id:val('d-client'), transaction:val('d-trans'), statut:val('d-statut'),
    surface_min_m2:numVal('d-smin'), surface_max_m2:numVal('d-smax'), budget_max:numVal('d-budget'),
    tolerance_budget_pct:numVal('d-tolb')??15, tolerance_surface_pct:numVal('d-tols')??15, urgence:val('d-urgence'),
    types_bien: Object.keys(LABELS).filter(k=>document.getElementById('dt-'+k).checked),
    criteres_secondaires: { parking:document.getElementById('d-park').checked,
      parking_places: (function(){ const n=parseInt(document.getElementById('d-park-nb').value,10); return isNaN(n)?null:n; })(),
      pmr:document.getElementById('d-pmr').checked } };
  let id=rec.id;
  if(id){ const { error } = await sb.from('demandes').update(payload).eq('id',id); if(error) throw error; }
  else{
    payload.date_demande = new Date().toISOString().slice(0,10);
    const { data, error } = await sb.from('demandes').insert(payload).select('id').single();
    if(error) throw error; id=data.id;
  }
  // localités : on remplace l'ensemble
  await sb.from('demande_localites').delete().eq('demande_id', id);
  const locs=[...document.querySelectorAll('#loc-list .loc-row')].map(r=>({
    demande_id:id, ville:titleStr(r.querySelector('.loc-ville').value), code_postal:(r.querySelector('.loc-cp').value||'').trim()
  })).filter(l=>l.ville||l.code_postal);
  if(locs.length){ const { error } = await sb.from('demande_localites').insert(locs); if(error) throw error; }
  vueDemandes();
}

/* ----- MANDAT ----- */
async function nouveauMandat(){ await Promise.all([chargerClients(),chargerOffresListe()]); formMandat(); }
async function editMandat(id){ await Promise.all([chargerClients(),chargerOffresListe()]); formMandat(MANDATS.find(m=>m.id===id)); }
function formMandat(rec){
  rec=rec||{};
  const corps=`<div class="form-grid">
    <div class="f full"><label>Bien (offre)</label><select id="m-offre">${optOffres(rec.offre_id)}</select></div>
    <div class="f full"><label>Client mandant</label><select id="m-client">${optClients(rec.client_id)}</select></div>
    ${fSel('m-type','Type de mandat',rec.type_mandat||'vente',[['vente','Vente'],['location','Location']])}
    ${fSel('m-excl','Exclusivité',rec.exclusivite||'simple',[['simple','Simple'],['exclusif','Exclusif']])}
    ${fText('m-debut','Date de début',rec.date_debut,{type:'date'})}
    ${fText('m-fin','Date de fin',rec.date_fin,{type:'date'})}
    ${fNum('m-duree','Durée (mois)',rec.duree_mois)}
    ${fText('m-comm','Commission',rec.commission)}
    ${fSel('m-statut','Statut',rec.statut||'actif',[['actif','Actif'],['expire','Expiré'],['abouti','Abouti']])}
  </div>`;
  ouvrirForm(rec.id?'Modifier le mandat':'Nouveau mandat', corps, async()=>{
    await save('mandats', rec.id, { offre_id:val('m-offre'), client_id:val('m-client'), type_mandat:val('m-type'),
      exclusivite:val('m-excl'), date_debut:val('m-debut'), date_fin:val('m-fin'), duree_mois:numVal('m-duree'),
      commission:val('m-comm'), statut:val('m-statut') });
    vueMandats();
  }, rec.id ? async()=>{ await del('mandats', rec.id); vueMandats(); } : null, 'mandat:'+(rec.id||'new'));
  draftApply('mandat:'+(rec.id||'new'));
}

/* Sauvegarde du brouillon si on quitte l'onglet ou ferme la fenêtre (anti-interruption) */
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) draftCollect(CURRENT_FORM_KEY); });
window.addEventListener('beforeunload', ()=>{ draftCollect(CURRENT_FORM_KEY); });

init();
</script>
<script src="dossier.js"></script>
</body>
